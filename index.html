<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syncpad</title>

<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">Syncpad</h1>
        <div class="actions">

            <button class="btn" id="myNotesBtn">
                <span class="btn-icon">📋</span>
                My Space
            </button>

            <button class="btn" id="shareBtn">
                <span class="btn-icon">🔗</span>
                Share
            </button>

            <button class="btn" id="newBtn">
                <span class="btn-icon">✦</span>
                New
            </button>

            <button class="btn" id="clearBtn">
                <span class="btn-icon">🗑</span>
                Clear
            </button>

        </div>
    </div>

    <div class="editor-container">
        <textarea id="notepad" class="textarea" placeholder="Start typing..."></textarea>
    </div>
    <div class="status-bar">
        <span id="syncStatus" class="status-pill">Synced</span>
        <span id="presenceStatus" class="status-text">1 person editing</span>
        <span id="noteStats" class="status-text">0 words · 0 chars</span>
    </div>
</div>

<!-- My Notepads Panel -->
<div id="panel-overlay"></div>
<div id="panel">
    <div class="panel-header">
        <span class="panel-title">My Space</span>
        <button class="panel-close" id="panelClose">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-footer" id="panelFooter"></div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
